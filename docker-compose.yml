services:
  api:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-julienlambs}/appcook-api:${IMAGE_TAG:-latest}
    container_name: appcook_api
    volumes:
      - /volume1/docker/appcook/data:/data
    environment:
      - APPCOOK_DB_FILE=/data/recettes.db
      - APPCOOK_ADMIN_TOKEN=${APPCOOK_ADMIN_TOKEN:-}
      - APPCOOK_ALLOWED_ORIGINS=${APPCOOK_ALLOWED_ORIGINS:-}
    restart: unless-stopped

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-julienlambs}/appcook-frontend:${IMAGE_TAG:-latest}
    container_name: appcook_frontend
    environment:
      - APPCOOK_HTTPS_MODE=${APPCOOK_HTTPS_MODE:-auto}
      - APPCOOK_HTTPS_PORT=${APPCOOK_HTTPS_PORT:-8443}
      - APPCOOK_TLS_SERVER_NAME=${APPCOOK_TLS_SERVER_NAME:-_}
      - APPCOOK_TLS_CERT_PATH=${APPCOOK_TLS_CERT_PATH:-/etc/appcook/certs/fullchain.pem}
      - APPCOOK_TLS_KEY_PATH=${APPCOOK_TLS_KEY_PATH:-/etc/appcook/certs/privkey.pem}
      - APPCOOK_HTTPS_REDIRECT_PORT=${APPCOOK_HTTPS_REDIRECT_PORT:-8443}
    ports:
      - "${APPCOOK_HTTP_PORT:-8082}:80"
      - "${APPCOOK_HTTPS_PORT:-8443}:443"
    volumes:
      - ${APPCOOK_TLS_CERT_DIR:-./deploy/certs}:/etc/appcook/certs:ro
    depends_on:
      - api
    restart: unless-stopped
